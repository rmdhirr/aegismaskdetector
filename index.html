<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisMask: Edge Checkpoint</title>
    
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .status-panel {
            margin-top: 15px;
            margin-bottom: 25px;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #555;
            width: 580px;
            transition: all 0.2s ease-in-out;
        }

        /* --- PERFECT ALIGNMENT CONTAINER --- */
        .container {
            position: relative;
            width: 640px;
            height: 480px;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            border: 2px solid #555;
            border-radius: 8px;
            object-fit: fill; 
        }

        canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px; 
            height: 480px; 
            pointer-events: none; 
            z-index: 9999; /* Forces the canvas to the absolute front */
        }
    </style>
</head>
<body>

    <h1>🛡️ AEGIS MASK: Edge Checkpoint</h1>
    <p>Local WebAssembly Inference Protocol</p>

    <div class="status-panel" id="status-panel">INITIALIZING PROTOCOL...</div>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <!-- Hidden processor canvas for 640x640 YOLO input formatting -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
